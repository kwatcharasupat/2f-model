site_name: Seabass

# Managed by newt to support integration with Manuals and Stash.
repo_url: !ENV REPO_URL
site_url: !ENV SITE_URL

edit_uri: edit
repo_name: Stash

nav:
  - Overview: index.md
  - Validation: validation/index.md
#  - Conceptual Information:
#    - concepts/index.md
#  - Getting Started:
#    - starting/index.md
#  - Use Case Guides:
#    - guides/index.md
#  - Reference Material:
#    - ref/index.md
#    - ref/api_docs.md
#    - ref/clients.md
#    - ref/release_notes.md
#  - Support:
#    - support/faq.md
#    - support/troubleshooting.md

theme:
  name: default
  logo: docs/assets/seabass-nobg.png

extra_css:
   - stylesheets/extra.css
# There are many available formatting extensions available, please read:
# https://facelessuser.github.io/pymdown-extensions/
markdown_extensions:
  - toc:
      permalink: True
  - admonition
  - pymdownx.tilde
  - pymdownx.arithmatex

extra_javascript:
  - 'https://cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.0/MathJax.js?config=TeX-MML-AM_CHTML'
